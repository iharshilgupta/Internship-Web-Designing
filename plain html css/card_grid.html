<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid cards</title>
    <link rel="stylesheet" href="card_grid.css" />
  </head>
  <body>
    <div>
      <h1>Grid card</h1>
      <div id="cen">
        <div class="card">
          <h2>Card 1</h2>
          Information about the card and solving the card problem using Grid
          <button>Button for card 1</button>
        </div>
        <div class="card">
          <h2>Card 2</h2>
          This card displays information about the second card using Grid
          <button>Button for card 2</button>
        </div>
        <div class="card">
          <h2>Card 3</h2>
          This card displays info and stuff you would like to know using Grid
          <button>Button for card 3</button>
        </div>
        <button id="end">End button</button>
      </div>
    </div>
  </body>
</html>
